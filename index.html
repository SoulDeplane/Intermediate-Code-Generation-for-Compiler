<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Code Generator for C Language</title>
    <style>
        :root {
            --bg: #1a1c19;
            --panel-bg: #242921;
            --accent: #c69d6d;
            --text-main: #e2e8e0;
            --text-dim: #94a3b8;
            --border: #3a4235;
            --success: #81b29a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
        }

        header {
            grid-column: span 2;
            display: flex;
            align-items: center;
            padding-bottom: 20px;
            gap: 20px;
        }

        .header-line {
            flex-grow: 1;
            height: 1px;
            background: var(--accent);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -1px;
            text-align: center;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            min-height: 0;
        }

        .panel-header {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }
        .tabs-header {
            padding: 0;
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            overflow-x: auto;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            color: var(--text-dim);
            border: none;
            border-radius: 0;
            padding: 12px 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            text-align: center;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
            transform: none;
            opacity: 1;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-content {
            display: none;
            flex: 1 1 0;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .tab-content.active {
            display: flex;
        }

        textarea {
            flex: 1 1 0;
            min-height: 0;
            background: transparent;
            border: none;
            color: #cbd5e1;
            padding: 20px;
            font-size: 14px;
            resize: none;
            outline: none;
            line-height: 1.6;
            overflow: auto;
        }

        textarea::placeholder {
            color: var(--accent);
            opacity: 0.7;
        }

        .controls {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:not(.tab-btn):hover {
            opacity: 0.9;
        }

        button:not(.tab-btn):active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            opacity: 1;
            color: var(--text-main);
        }

        .output-container {
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: 100%;
        }

        .output-container > .panel {
            flex: 1 1 0;
            min-height: 0;
        }

        pre {
            margin: 0;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            overflow: auto;
            color: #94a3b8;
            flex: 1 1 0;
            min-height: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .text-error {
            color: #ef4444 !important;
        }

        pre:empty::before,
        .table-view:empty::before,
        .tree-view:empty::before {
            content: attr(placeholder);
            color: var(--accent);
            opacity: 0.7;
            font-style: normal;
            font-family: inherit;
            font-size: 14px;
            display: block;
            padding: 20px;
        }

        .tree-view {
            flex: 1 1 0;
            min-height: 0;
            overflow: auto;
            padding: 20px 24px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            color: var(--text-main);
        }
        .tree-view ul {
            list-style: none;
            margin: 0;
            padding-left: 28px;
            position: relative;
        }
        .tree-view > ul {
            padding-left: 0;
        }
        .tree-view li {
            position: relative;
            padding: 4px 0 4px 16px;
        }
        .tree-view ul ul li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            border-left: 1px solid var(--border);
            height: 100%;
            width: 0;
        }
        .tree-view ul ul li::after {
            content: '';
            position: absolute;
            left: 0;
            top: 14px;
            border-top: 1px solid var(--border);
            width: 14px;
        }
        .tree-view ul ul li:last-child::before {
            height: 14px;
        }
        .tree-view .node {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
        }
        .tree-view .node.internal {
            color: var(--accent);
            font-weight: 600;
        }
        .tree-view .node.leaf {
            color: var(--success);
            font-family: 'Consolas', 'Courier New', monospace;
            background: rgba(129, 178, 154, 0.08);
            border-color: rgba(129, 178, 154, 0.3);
        }
        .tree-view .empty {
            color: var(--text-dim);
            font-style: italic;
        }

        .table-view {
            flex: 1 1 0;
            min-height: 0;
            overflow: auto;
            padding: 18px 22px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            color: var(--text-main);
        }
        .table-view table {
            border-collapse: collapse;
            width: 100%;
        }
        .table-view th,
        .table-view td {
            border: 1px solid var(--border);
            padding: 6px 12px;
            text-align: left;
            vertical-align: top;
        }
        .table-view th {
            background: rgba(255,255,255,0.04);
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
        }
        .table-view tbody tr:nth-child(even) {
            background: rgba(255,255,255,0.02);
        }
        .table-view tbody tr:hover {
            background: rgba(198, 157, 109, 0.08);
        }
        .table-view td.mono {
            font-family: 'Consolas', 'Courier New', monospace;
            color: var(--success);
        }
        .table-view td.num {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .table-view .empty {
            color: var(--text-dim);
            font-style: italic;
        }

        .tab-btn.mobile-only {
            display: none;
        }

        @media (max-width: 900px) {
            .app-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr;
            }

            header {
                grid-column: 1;
                grid-row: 1;
            }

            .output-container {
                grid-column: 1;
                grid-row: 2;
            }

            #inputPanel {
                grid-column: 1;
                grid-row: 3;
                min-height: 0;
            }

            .tab-btn.mobile-only {
                display: block;
            }

            .app-container.input-mode .output-container .tab-content {
                display: none;
            }

            .app-container.input-mode .output-container > .panel {
                flex: 0 0 auto;
                height: auto;
                border-bottom-left-radius: 0;
                border-bottom-right-radius: 0;
                border-bottom: none;
                box-shadow: none;
            }

            .app-container.input-mode #inputPanel {
                border-top-left-radius: 0;
                border-top-right-radius: 0;
                margin-top: -20px;
            }

            .app-container:not(.input-mode) #inputPanel {
                display: none;
            }

            .app-container:not(.input-mode) .output-container {
                grid-row: 2 / 4;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <div class="header-line"></div>
            <div class="logo">Intermediate Code Generation for Compiler</div>
            <div class="header-line"></div>
        </header>

        <section class="panel" id="inputPanel">
            <textarea id="userInput" placeholder="Enter C code here..."></textarea>
            <div class="controls">
                <button id="execBtn">Process Data</button>
                <button id="clearBtn" class="btn-secondary">Clear</button>
            </div>
        </section>

        <div class="output-container">
            <section class="panel">
                <div class="tabs-header">
                    <button class="tab-btn mobile-only" data-tab="__input__">Input</button>
                    <button class="tab-btn active" data-tab="tac-tab">TAC & Errors</button>
                    <button class="tab-btn" data-tab="tokens-tab">Lex Tokens</button>
                    <button class="tab-btn" data-tab="tree-tab">Parse Tree</button>
                    <button class="tab-btn" data-tab="symbol-tab">Symbol Table</button>
                    <button class="tab-btn" data-tab="corrected-tab">Auto-Corrected</button>
                </div>

                <div class="tab-content active" id="tac-tab">
                    <pre id="resultOut" style="color: var(--accent);" placeholder="TAC Output and Errors will appear here..."></pre>
                </div>
                
                <div class="tab-content" id="tokens-tab">
                    <div id="tokensOut" class="table-view"  placeholder="Lex Tokens will appear here..."></div>
                </div>

                <div class="tab-content" id="tree-tab">
                    <div id="treeOut" class="tree-view"  placeholder="Parse Tree will appear here..."></div>
                </div>

                <div class="tab-content" id="symbol-tab">
                    <div id="symbolOut" class="table-view"  placeholder="Symbol Table will appear here..."></div>
                </div>

                <div class="tab-content" id="corrected-tab">
                    <pre id="correctedOut" style="color: var(--success);" placeholder="Auto-Corrected Code will appear here..."></pre>
                </div>
            </section>
        </div>
    </div>

    <script>
        const execBtn = document.getElementById('execBtn');
        const clearBtn = document.getElementById('clearBtn');
        const userInput = document.getElementById('userInput');
        const resultOut = document.getElementById('resultOut');
        const correctedOut = document.getElementById('correctedOut');
        const tokensOut = document.getElementById('tokensOut');
        const treeOut = document.getElementById('treeOut');
        const symbolOut = document.getElementById('symbolOut');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        const appContainer = document.querySelector('.app-container');
        if (window.matchMedia('(max-width: 900px)').matches) {
            appContainer.classList.add('input-mode');
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (btn.dataset.tab === '__input__') {
                    appContainer.classList.add('input-mode');
                } else {
                    appContainer.classList.remove('input-mode');
                    tabContents.forEach(c => c.classList.remove('active'));
                    document.getElementById(btn.dataset.tab).classList.add('active');
                }
            });
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key !== 'Tab' || e.ctrlKey || e.altKey || e.metaKey) return;
            e.preventDefault();
            const start = userInput.selectionStart;
            const end = userInput.selectionEnd;
            const value = userInput.value;
            const INDENT = '        ';

            if (start === end) {
                userInput.value = value.substring(0, start) + INDENT + value.substring(end);
                userInput.selectionStart = userInput.selectionEnd = start + INDENT.length;
                return;
            }

            const lineStart = value.lastIndexOf('\n', start - 1) + 1;
            const before = value.substring(0, lineStart);
            const block = value.substring(lineStart, end);
            const after = value.substring(end);
            let modified;
            let delta;
            if (e.shiftKey) {
                modified = block.replace(/^( {1,8}|\t)/gm, '');
                delta = modified.length - block.length;
            } else {
                modified = block.replace(/^/gm, INDENT);
                delta = modified.length - block.length;
            }
            userInput.value = before + modified + after;
            userInput.selectionStart = lineStart;
            userInput.selectionEnd = end + delta;
        });
        function renderTree(node) {
            const li = document.createElement('li');
            const span = document.createElement('span');
            span.classList.add('node');
            const isLeaf = !node.children || node.children.length === 0;
            span.classList.add(isLeaf ? 'leaf' : 'internal');
            span.textContent = node.label;
            li.appendChild(span);
            if (!isLeaf) {
                const ul = document.createElement('ul');
                for (const child of node.children) {
                    ul.appendChild(renderTree(child));
                }
                li.appendChild(ul);
            }
            return li;
        }

        function showTree(container, root) {
            container.innerHTML = '';
            if (!root) {
                container.innerHTML = '<div class="empty">No parse tree available.</div>';
                return;
            }
            const ul = document.createElement('ul');
            ul.appendChild(renderTree(root));
            container.appendChild(ul);
        }

        function showTable(container, rows, columns, emptyMessage) {
            container.innerHTML = '';
            if (!rows || rows.length === 0) {
                container.innerHTML = `<div class="empty">${emptyMessage}</div>`;
                return;
            }
            const table = document.createElement('table');
            const thead = document.createElement('thead');
            const headRow = document.createElement('tr');
            for (const col of columns) {
                const th = document.createElement('th');
                th.textContent = col.label;
                headRow.appendChild(th);
            }
            thead.appendChild(headRow);
            table.appendChild(thead);
            const tbody = document.createElement('tbody');
            for (const row of rows) {
                const tr = document.createElement('tr');
                for (const col of columns) {
                    const td = document.createElement('td');
                    if (col.cls) td.className = col.cls;
                    td.textContent = row[col.key] !== undefined ? row[col.key] : '';
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
            table.appendChild(tbody);
            container.appendChild(table);
        }

        const TOKEN_COLS = [
            { key: 'line', label: 'Line', cls: 'num' },
            { key: 'type', label: 'Token' },
            { key: 'text', label: 'Text', cls: 'mono' }
        ];
        const SYMBOL_COLS = [
            { key: 'name',   label: 'Name',   cls: 'mono' },
            { key: 'kind',   label: 'Kind' },
            { key: 'type',   label: 'Type' },
            { key: 'scope',  label: 'Scope',  cls: 'num' },
            { key: 'status', label: 'Status' }
        ];

        execBtn.addEventListener('click', async () => {
            const input = userInput.value;
            resultOut.textContent = '';
            correctedOut.textContent = '';
            tokensOut.innerHTML = '';
            treeOut.innerHTML = '';
            symbolOut.innerHTML = '';
            resultOut.classList.remove('text-error');

            if (!input.trim()) {
                resultOut.classList.add('text-error');
                resultOut.textContent = 'Error: No input found.';
                document.querySelector('[data-tab="tac-tab"]').click();
                return;
            }

            try {
                const response = await fetch('/compile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: input })
                });
                const data = await response.json();

                if (response.ok) {
                    const correctedTabBtn = document.querySelector('[data-tab="corrected-tab"]');
                    const initialErr = (data.initial_stderr || '').trim();
                    const finalErr = (data.final_stderr || '').trim();
                    const tac = (data.tac || '').trim();
                    const hasCorr = !!data.has_corrections;
                    const remainingErr = finalErr;
                    let displayContent = '';

                    if (initialErr && hasCorr) {
                        displayContent += 'Original issues detected:\n' + initialErr + '\n\n';
                        displayContent += 'Auto-corrections applied.\n\n';
                    } else if (initialErr) {
                        displayContent += 'Issues detected:\n' + initialErr + '\n\n';
                    }

                    if (remainingErr && hasCorr) {
                        displayContent += 'Remaining after auto-correction:\n' + remainingErr + '\n\n';
                    }

                    if (tac) {
                        displayContent += 'Generated TAC:\n' + tac;
                    } else if (!initialErr && !remainingErr) {
                        displayContent = 'No output produced.';
                    }

                    resultOut.textContent = displayContent;
                    showTable(tokensOut, data.lex_tokens_json, TOKEN_COLS, 'No lexical tokens available.');
                    showTree(treeOut, data.parser_tree_json);
                    showTable(symbolOut, data.symbol_table_json, SYMBOL_COLS, 'No symbols recorded.');
                    correctedOut.textContent = hasCorr ? (data.corrected_code || '') : '';
                    
                    if (hasCorr) {
                        correctedTabBtn.style.color = 'var(--success)';
                        correctedTabBtn.textContent = 'Auto-Corrected *';
                    } else {
                        correctedTabBtn.style.color = '';
                        correctedTabBtn.textContent = 'Auto-Corrected';
                    }
                    document.querySelector('[data-tab="tac-tab"]').click();

                } else {
                    resultOut.classList.add('text-error');
                    resultOut.textContent = `Error: ${data.stderr || 'Unknown server error.'}`;
                    document.querySelector('[data-tab="tac-tab"]').click();
                }
            } catch (err) {
                resultOut.classList.add('text-error');
                resultOut.textContent = `Network Error: ${err.message}`;
                document.querySelector('[data-tab="tac-tab"]').click();
            }
        });
        clearBtn.addEventListener('click', () => {
            userInput.value = '';
            resultOut.textContent = '';
            correctedOut.textContent = '';
            tokensOut.innerHTML = '';
            treeOut.innerHTML = '';
            symbolOut.innerHTML = '';
            resultOut.classList.remove('text-error');
        });
    </script>
</body>

</html>
