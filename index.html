<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Code Generator for C Language</title>
    <style>
        :root {
            --bg: #1a1c19;
            --panel-bg: #242921;
            --accent: #c69d6d;
            --text-main: #e2e8e0;
            --text-dim: #94a3b8;
            --border: #3a4235;
            --success: #81b29a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
        }

        header {
            grid-column: span 2;
            display: flex;
            align-items: center;
            padding-bottom: 20px;
            gap: 20px;
        }

        .header-line {
            flex-grow: 1;
            height: 1px;
            background: var(--accent);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -1px;
            text-align: center;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            min-height: 0;
        }

        .panel-header {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }

        /* Tabs Styling */
        .tabs-header {
            padding: 0;
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            overflow-x: auto;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            color: var(--text-dim);
            border: none;
            border-radius: 0;
            padding: 12px 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            text-align: center;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
            transform: none;
            opacity: 1;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-content {
            display: none;
            flex-grow: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-content.active {
            display: flex;
        }

        textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #cbd5e1;
            padding: 20px;
            font-size: 14px;
            resize: none;
            outline: none;
            line-height: 1.6;
            overflow: auto;
        }

        textarea::placeholder {
            color: var(--accent);
            opacity: 0.7;
        }

        .controls {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:not(.tab-btn):hover {
            opacity: 0.9;
        }

        button:not(.tab-btn):active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            opacity: 1;
            color: var(--text-main);
        }

        .output-container {
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: 100%;
        }

        pre {
            margin: 0;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            overflow: auto;
            color: #94a3b8;
            flex-grow: 1;
        }

        .text-error {
            color: #ef4444 !important;
        }

        pre:empty::before {
            content: attr(placeholder);
            color: var(--text-dim);
            font-style: italic;
        }

        @media (max-width: 900px) {
            .app-container {
                grid-template-columns: 1fr;
            }

            header {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <div class="header-line"></div>
            <div class="logo">Intermediate Code Generation for Compiler</div>
            <div class="header-line"></div>
        </header>

        <section class="panel">
            <div class="panel-header">
                <span>Input Workspace</span>
                <span>UTF-8</span>
            </div>
            <textarea id="userInput" placeholder="Enter C code here..."></textarea>
            <div class="controls">
                <button id="execBtn">Process Data</button>
                <button id="clearBtn" class="btn-secondary">Clear</button>
            </div>
        </section>

        <div class="output-container">
            <section class="panel" style="height: 100%;">
                <div class="tabs-header">
                    <button class="tab-btn active" data-tab="tac-tab">TAC & Errors</button>
                    <button class="tab-btn" data-tab="tokens-tab">Lex Tokens</button>
                    <button class="tab-btn" data-tab="tree-tab">Parser Tree</button>
                    <button class="tab-btn" data-tab="symbol-tab">Symbol Table</button>
                    <button class="tab-btn" data-tab="corrected-tab">Auto-Corrected</button>
                </div>

                <div class="tab-content active" id="tac-tab">
                    <pre id="resultOut" style="color: var(--accent);" placeholder="TAC output or errors will appear here..."></pre>
                </div>
                
                <div class="tab-content" id="tokens-tab">
                    <pre id="tokensOut" placeholder="Lexical tokens will appear here..."></pre>
                </div>

                <div class="tab-content" id="tree-tab">
                    <pre id="treeOut" placeholder="Abstract Syntax Tree will appear here..."></pre>
                </div>

                <div class="tab-content" id="symbol-tab">
                    <pre id="symbolOut" placeholder="Symbol table data will appear here..."></pre>
                </div>

                <div class="tab-content" id="corrected-tab">
                    <pre id="correctedOut" style="color: var(--success);" placeholder="Auto-corrected code will appear here..."></pre>
                </div>
            </section>
        </div>
    </div>

    <script>
        const execBtn = document.getElementById('execBtn');
        const clearBtn = document.getElementById('clearBtn');
        const userInput = document.getElementById('userInput');
        
        // Output elements
        const resultOut = document.getElementById('resultOut');
        const correctedOut = document.getElementById('correctedOut');
        const tokensOut = document.getElementById('tokensOut');
        const treeOut = document.getElementById('treeOut');
        const symbolOut = document.getElementById('symbolOut');

        // Tab Switching Logic
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all buttons and contents
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));

                // Add active class to clicked button and corresponding content
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // Execution Logic
        execBtn.addEventListener('click', async () => {
            const input = userInput.value;
            
            // Reset fields
            resultOut.textContent = '';
            correctedOut.textContent = '';
            tokensOut.textContent = '';
            treeOut.textContent = '';
            symbolOut.textContent = '';
            resultOut.classList.remove('text-error');

            if (!input.trim()) {
                resultOut.classList.add('text-error');
                resultOut.textContent = 'Error: No input found.';
                // Auto-switch to TAC/Errors tab on input error
                document.querySelector('[data-tab="tac-tab"]').click();
                return;
            }

            try {
                const response = await fetch('/compile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: input })
                });
                const data = await response.json();

                if (response.ok) {
                    const correctedTabBtn = document.querySelector('[data-tab="corrected-tab"]');
                    const initialErr = (data.initial_stderr || '').trim();
                    const finalErr = (data.final_stderr || '').trim();
                    const tac = (data.tac || '').trim();
                    const hasCorr = !!data.has_corrections;

                    // 1. Handle TAC and Errors Tab Display
                    let displayContent = '';
                    
                    if (initialErr) {
                        displayContent += '    --- Compiler Diagnostics ---\n' + initialErr + '\n\n';
                    }
                    
                    if (hasCorr) {
                        displayContent += '    [SUCCESS] Auto-corrections applied successfully.\n\n';
                    }
                    
                    if (tac && tac !== "No TAC generated.") {
                        displayContent += '    --- Generated Optimized TAC ---\n' + tac;
                    } else if (finalErr && !initialErr) {
                        displayContent += '    --- Errors ---\n' + finalErr;
                    }
                    
                    if (!displayContent) {
                        displayContent = "No output or errors generated.";
                    }
                    
                    resultOut.textContent = displayContent;
                    
                    // 2. Populate Other Tabs
                    tokensOut.textContent = data.lex_tokens || 'No lexical tokens available.';
                    treeOut.textContent = data.parser_tree || 'No parser tree available.';
                    symbolOut.textContent = data.symbol_table || 'No symbol table available.';
                    
                    // 3. Handle Auto-Corrected Code
                    correctedOut.textContent = hasCorr ? (data.corrected_code || '') : '';
                    
                    if (hasCorr) {
                        correctedTabBtn.style.color = 'var(--success)';
                        correctedTabBtn.textContent = 'Auto-Corrected *';
                    } else {
                        correctedTabBtn.style.color = '';
                        correctedTabBtn.textContent = 'Auto-Corrected';
                    }
                    
                    // Automatically switch to the Result tab
                    document.querySelector('[data-tab="tac-tab"]').click();

                } else {
                    resultOut.classList.add('text-error');
                    resultOut.textContent = `Error: ${data.stderr || 'Unknown server error.'}`;
                    document.querySelector('[data-tab="tac-tab"]').click();
                }
            } catch (err) {
                resultOut.classList.add('text-error');
                resultOut.textContent = `Network Error: ${err.message}`;
                document.querySelector('[data-tab="tac-tab"]').click();
            }
        });

        // Clear Logic
        clearBtn.addEventListener('click', () => {
            userInput.value = '';
            resultOut.textContent = '';
            correctedOut.textContent = '';
            tokensOut.textContent = '';
            treeOut.textContent = '';
            symbolOut.textContent = '';
            resultOut.classList.remove('text-error');
        });
    </script>
</body>

</html>
